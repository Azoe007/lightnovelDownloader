services:
  - type: web
    name: lncrawler-backend
    env: docker
    region: frankfurt
    plan: free
    rootDir: backend
    envVars:
      - key: DATABASE_URL
        value: sqlite+aiosqlite:///./lncrawler.db
      - key: DOWNLOAD_DIR
        value: ./downloads
      - key: COVER_DIR
        value: ./covers
      - key: MAX_CONCURRENT_DOWNLOADS
        value: "3"
      - key: CHAPTER_DELAY
        value: "1"
    disk:
      name: data
      mountPath: /app
      sizeGB: 1
