services:
  - type: web
    name: lncrawler-backend
    env: docker
    region: frankfurt
    plan: free
    rootDir: backend
    dockerfilePath: Dockerfile
    # Using Docker: Render will build the image from backend/Dockerfile
    # Build/start commands are handled inside the Docker image.
    envVars:
      - key: PYTHON_VERSION
        value: "3.11"
      - key: DATABASE_URL
        value: sqlite+aiosqlite:///./lncrawler.db
      - key: DOWNLOAD_DIR
        value: ./downloads
      - key: COVER_DIR
        value: ./covers
      - key: MAX_CONCURRENT_DOWNLOADS
        value: "3"
      - key: CHAPTER_DELAY
        value: "1"
    disk:
      name: data
      # Mount persistent disk outside of the project source to avoid
      # overwriting files in the app directory. Use /data for runtime storage.
      mountPath: /data
      sizeGB: 1
