services:
  - type: web
    name: lncrawler-backend
    env: python
    region: frankfurt
    plan: free
    rootDir: backend
    buildCommand: "pip install -r requirements.txt"
    startCommand: "uvicorn app.main:app --host 0.0.0.0 --port $PORT"
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: DATABASE_URL
        value: sqlite+aiosqlite:///./lncrawler.db
      - key: DOWNLOAD_DIR
        value: ./downloads
      - key: COVER_DIR
        value: ./covers
      - key: MAX_CONCURRENT_DOWNLOADS
        value: "3"
      - key: CHAPTER_DELAY
        value: "1"
    disk:
      name: data
      mountPath: /opt/render/project/src
      sizeGB: 1